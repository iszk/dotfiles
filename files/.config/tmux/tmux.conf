# デフォルトのプレフィックスを解除
unbind C-b

# 新しいプレフィックスを C-g に設定
set -g prefix C-g
bind-key C-g send-prefix

# Prefix + r で設定ファイルを再読み込みする
bind r source-file ~/.config/tmux/tmux.conf \; display "Reloaded!"

# ステータスバーをトップに配置（好みで bottom に変更可）
set -g status-position bottom

# 背景色を透明にする（ターミナルの背景に馴染む）
set -g status-style bg=default

# 左側：セッション名
set -g status-left "#[fg=gray] #S #[default] "

# 右側：日時のみ
set -g status-right "#[fg=gray] %Y-%m-%d %H:%M #h "

# ウィンドウリストの見た目
## アクティブなウィンドウ
setw -g window-status-current-format "#[fg=#111111,bg=#cccccc,bold] #I:#W #[default]"
## 非アクティブなウィンドウ
setw -g window-status-format " #I:#W "
